# Mu2e Shift Scheduler Configuration
# All values here are defaults and can be overridden by CLI arguments.

global:
  target_shifts_per_person: 6   # Soft target: penalty applied when actual != target
  min_shifts_per_person: 4      # Hard minimum: each person must have at least this many
  max_shifts_per_person: 8      # Hard maximum: each person may have at most this many

# alpha controls the tradeoff between preference satisfaction and load balancing.
# Higher alpha => prioritize equitable shift counts over personal preferences.
# Lower alpha => prioritize preferences, allow more uneven distribution.
alpha: 1.0

# Per-person constraint overrides (optional).
# These take precedence over the global defaults above.
overrides: []
# Example:
# overrides:
#   - name: "Alice"
#     min: 2
#     max: 4
#     target: 3

web:
  host: "127.0.0.1"
  port: 5000
  debug: false
