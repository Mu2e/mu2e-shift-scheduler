# Mu2e Shift Scheduler Configuration
# All values here are defaults and can be overridden by CLI arguments.

global:
  target_shifts_per_person: 2  # Soft target: penalty applied when actual != target
  min_shifts_per_person: 1     # Hard minimum: each person must have at least this many
  max_shifts_per_person: 4     # Hard maximum: each person may have at most this many
  pass2_min_shifts_per_person: 0    # Pass-2 hard minimum (re-solve of non-preferred shifts)
  pass2_max_shifts_per_person: 1 # Pass-2 hard maximum

# alpha controls the tradeoff between preference satisfaction and load balancing.
# Higher alpha => prioritize equitable shift counts over personal preferences.
# Lower alpha => prioritize preferences, allow more uneven distribution.
alpha: 1.0

# Per-person constraint overrides (optional).
# These take precedence over the global defaults above.
overrides: []
# Example:
# overrides:
#   - name: "Alice"
#     min: 2
#     max: 4
#     target: 3

web:
  host: "127.0.0.1"
  port: 5000
  debug: false
