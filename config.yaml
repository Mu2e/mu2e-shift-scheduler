# Mu2e Shift Scheduler Configuration
# All values here are defaults and can be overridden by CLI arguments.

global:
  target_points_per_person: 2.0  # Soft target: penalty applied when actual != target (in shift-points)
  min_points_per_person: 1.0     # Hard minimum shift-points each person must accumulate
  max_points_per_person: 4.0     # Hard maximum shift-points each person may accumulate
  pass2_min_points_per_person: 0.0    # Pass-2 hard minimum (re-solve of non-preferred shifts)
  pass2_max_points_per_person: 2.0    # Pass-2 hard maximum

# Shift point values.
# Each shift carries a point value used in constraints and the objective.
# If a shift's CSV row includes a "points" column that value is used directly;
# otherwise the value is computed from the rules below.
shift_points:
  default: 1.0         # Points for a normal shift
  night: 2.0           # Points for a night shift
  night_start: "20:00" # Start of the night window (HH:MM, inclusive)
  night_end: "08:00"   # End of the night window (HH:MM, exclusive); wraps midnight when < night_start

# alpha controls the tradeoff between preference satisfaction and load balancing.
# Higher alpha => prioritize equitable shift points over personal preferences.
# Lower alpha => prioritize preferences, allow more uneven distribution.
alpha: 1.0

# Per-person constraint overrides (optional).
# These take precedence over the global defaults above.
overrides: []
# Example:
# overrides:
#   - name: "Alice"
#     min: 2.0
#     max: 4.0
#     target: 3.0

web:
  host: "127.0.0.1"
  port: 5000
  debug: false
