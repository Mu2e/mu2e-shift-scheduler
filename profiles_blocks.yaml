# Block-shift preference profiles for generate_mu2e_blocks.py
#
# Each profile drives which shift blocks a person prefers.
# Fields:
#   name      : human-readable label (used in logs only)
#   primary   : list of [block_type, slot_label] pools — listed first (most preferred)
#   secondary : list of [block_type, slot_label] pools — appended after primary
#               Valid block_type values : weekday, weekend
#               Valid slot_label values : day, evening, night
#   num_prefs : [min, max] number of preferred shift blocks to assign

profiles:
  - name: weekday day
    primary:
      - [weekday, day]
    secondary:
      - [weekday, evening]
    num_prefs: [8, 14]

  - name: weekday evening
    primary:
      - [weekday, evening]
    secondary:
      - [weekday, day]
    num_prefs: [8, 14]

  - name: weekday night
    primary:
      - [weekday, night]
    secondary:
      - [weekend, night]
    num_prefs: [6, 12]

  - name: weekend day
    primary:
      - [weekend, day]
    secondary:
      - [weekend, evening]
    num_prefs: [8, 14]

  - name: weekend evening
    primary:
      - [weekend, evening]
    secondary:
      - [weekend, day]
    num_prefs: [8, 14]

  - name: weekend night
    primary:
      - [weekend, night]
    secondary:
      - [weekday, night]
    num_prefs: [6, 12]

  - name: flexible weekday
    primary:
      - [weekday, day]
      - [weekday, evening]
    secondary:
      - [weekday, night]
    num_prefs: [10, 16]

  - name: flexible weekend
    primary:
      - [weekend, day]
      - [weekend, evening]
    secondary:
      - [weekend, night]
    num_prefs: [10, 16]
